name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main # Ganti dengan nama branch utama kamu (bisa 'master')

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: 🔑 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e  # Hentikan script jika ada perintah yang gagal

            # Masuk ke direktori project di VPS
            cd /www/wwwroot/ichmal.my.id

            # Pull perubahan terbaru dari GitHub
            git pull origin main

            # Install dependencies baru (jika ada)
            npm install

            # Build project Next.js
            npm run build

            # Restart aplikasi dengan PM2
            pm2 restart portfolio-ihmal

            echo "✅ Deploy berhasil!"
